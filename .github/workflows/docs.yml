name: docs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
      - name: Check docs files
        run: |
          test -f README.md
          test -f docs/architecture.md
          test -f docs/roadmap.md
          test -f docs/benchmarks.md
          test -f docs/upstream-plan.md
          test -f docs/media/overview_recording_2026-03-17.mp4
      - name: Check example entry points
        run: |
          test -f examples/quickstart.py
          test -f examples/dashboard_app.py
      - name: Validate README asset references
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          
          root = Path(".")
          readme = root / "README.md"
          text = readme.read_text(encoding="utf-8")
          patterns = re.findall(r'(?:src|href)="([^"]+)"', text)
          missing = []
          for pattern in patterns:
              if pattern.startswith(("http://", "https://", "#", "mailto:")):
                  continue
              target = (root / pattern).resolve()
              if not target.exists():
                  missing.append(pattern)
          if missing:
              raise SystemExit("Missing README assets:\n" + "\n".join(missing))
          print(f"Validated {len(patterns)} README asset references.")
          PY
      - name: Export HTML snapshot
        run: |
          python scripts/make_screenshots.py --html-only
          test -f docs/screenshots/dashboard_snapshot.html
          test -f docs/screenshots/capture_manifest.json
