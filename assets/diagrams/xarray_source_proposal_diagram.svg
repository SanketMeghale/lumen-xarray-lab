<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="page" x1="108" y1="72" x2="1508" y2="932" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="0.55" stop-color="#F4F8FC"/>
      <stop offset="1" stop-color="#EDF4FB"/>
    </linearGradient>
    <linearGradient id="hero" x1="86" y1="84" x2="1180" y2="84" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1976D2"/>
      <stop offset="1" stop-color="#26A69A"/>
    </linearGradient>
    <linearGradient id="laneLeft" x1="74" y1="286" x2="424" y2="814" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8EE"/>
      <stop offset="1" stop-color="#FFF3E0"/>
    </linearGradient>
    <linearGradient id="laneCenter" x1="462" y1="286" x2="1134" y2="814" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5FAFF"/>
      <stop offset="1" stop-color="#EAF3FF"/>
    </linearGradient>
    <linearGradient id="laneRight" x1="1172" y1="286" x2="1526" y2="814" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5FBFA"/>
      <stop offset="1" stop-color="#EAF8F5"/>
    </linearGradient>
    <filter id="shellShadow" x="18" y="22" width="1564" height="934" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <filter id="cardShadow" x="-24" y="-24" width="1648" height="1040" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.07"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L12 7L2 12" stroke="#2B5876" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 46px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #0F172A; letter-spacing: -0.03em; }
      .subtitle { font: 400 20px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .section { font: 700 16px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #2563EB; letter-spacing: 0.14em; }
      .laneTitle { font: 700 30px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #0F172A; letter-spacing: -0.02em; }
      .laneText { font: 400 17px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #52606D; }
      .cardMini { font: 700 13px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #64748B; letter-spacing: 0.12em; }
      .cardTitle { font: 700 22px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #0F172A; letter-spacing: -0.02em; }
      .cardText { font: 400 16px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #52606D; }
      .impactTitle { font: 700 18px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .impactText { font: 400 14px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #64748B; }
      .calloutTitle { font: 700 18px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .calloutBody { font: 400 15px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #52606D; }
      .badge { font: 700 15px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .caption { font: 600 14px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #64748B; }
      .mono { font: 600 14px 'IBM Plex Mono', 'Consolas', monospace; fill: #35546B; }
      .border { stroke: #D7E2EE; stroke-width: 2; }
      .arrowLine { stroke: #2B5876; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .dash { stroke: #8FB3CC; stroke-width: 2.5; stroke-dasharray: 10 10; fill: none; }
    </style>
  </defs>

  <rect width="1600" height="980" rx="34" fill="url(#page)"/>
  <circle cx="1458" cy="136" r="154" fill="#DCEBFA"/>
  <circle cx="150" cy="884" r="168" fill="#E6F7F3"/>
  <circle cx="1462" cy="866" r="188" fill="#EAF2FB"/>

  <g filter="url(#shellShadow)">
    <rect x="40" y="36" width="1520" height="908" rx="30" fill="#FFFFFF" fill-opacity="0.90"/>
  </g>

  <rect x="86" y="86" width="146" height="14" rx="7" fill="url(#hero)"/>
  <text x="86" y="148" class="section">PROPOSAL ARCHITECTURE</text>
  <text x="86" y="208" class="title">Native xarray Support in Lumen</text>
  <text x="86" y="248" class="subtitle">Keep xarray-native coordinate semantics inside the source layer, then expose a stable DataFrame contract to the rest of Lumen.</text>

  <g filter="url(#cardShadow)">
    <rect x="1228" y="84" width="278" height="164" rx="24" fill="#F8FBFF" class="border"/>
  </g>
  <text x="1254" y="124" class="calloutTitle">Reviewer takeaway</text>
  <text x="1254" y="154" class="calloutBody">1. Query inside xarray first.</text>
  <text x="1254" y="182" class="calloutBody">2. Flatten only after reduction.</text>
  <text x="1254" y="210" class="calloutBody">3. Keep the Lumen integration surface unchanged.</text>

  <g filter="url(#cardShadow)">
    <rect x="86" y="272" width="340" height="544" rx="30" fill="url(#laneLeft)" class="border"/>
    <rect x="462" y="272" width="672" height="544" rx="30" fill="url(#laneCenter)" class="border"/>
    <rect x="1170" y="272" width="356" height="544" rx="30" fill="url(#laneRight)" class="border"/>
  </g>

  <rect x="104" y="292" width="104" height="30" rx="15" fill="#FFE8C7"/>
  <text x="130" y="312" class="caption">inputs</text>
  <rect x="486" y="292" width="152" height="30" rx="15" fill="#DCEBFA"/>
  <text x="518" y="312" class="caption">xarray source core</text>
  <rect x="1196" y="292" width="176" height="30" rx="15" fill="#DDF3EE"/>
  <text x="1230" y="312" class="caption">lumen boundary</text>

  <text x="104" y="360" class="laneTitle">Data Inputs</text>
  <text x="104" y="390" class="laneText">Multiple storage forms feed one acquisition path</text>
  <text x="104" y="412" class="laneText">and resolve into an `xr.Dataset`.</text>

  <rect x="104" y="426" width="304" height="100" rx="22" fill="#FFFFFF" class="border"/>
  <rect x="130" y="450" width="42" height="42" rx="11" fill="#F59E0B"/>
  <path d="M142 463H160M142 474H160M142 485H160" stroke="#7C4A03" stroke-width="3" stroke-linecap="round"/>
  <text x="192" y="463" class="cardTitle">NetCDF files</text>
  <text x="192" y="489" class="cardText">Local or remote `.nc` datasets</text>
  <text x="192" y="511" class="cardText">opened through `xr.open_dataset(...)`.</text>

  <rect x="104" y="544" width="304" height="100" rx="22" fill="#FFFFFF" class="border"/>
  <rect x="130" y="567" width="42" height="42" rx="11" fill="#14B8A6"/>
  <rect x="138" y="575" width="10" height="10" rx="2" fill="#D9FBF6"/>
  <rect x="154" y="575" width="10" height="10" rx="2" fill="#D9FBF6"/>
  <rect x="138" y="591" width="10" height="10" rx="2" fill="#D9FBF6"/>
  <rect x="154" y="591" width="10" height="10" rx="2" fill="#D9FBF6"/>
  <text x="192" y="582" class="cardTitle">Zarr stores</text>
  <text x="192" y="608" class="cardText">Directory-backed scientific stores</text>
  <text x="192" y="630" class="cardText">selected explicitly or by format detection.</text>

  <rect x="104" y="662" width="304" height="100" rx="22" fill="#FFFFFF" class="border"/>
  <circle cx="151" cy="712" r="22" fill="#8B5CF6"/>
  <circle cx="143" cy="705" r="4" fill="#F3E8FF"/>
  <circle cx="159" cy="705" r="4" fill="#F3E8FF"/>
  <path d="M137 720C142 715 160 715 165 720" stroke="#F3E8FF" stroke-width="3" stroke-linecap="round"/>
  <text x="192" y="700" class="cardTitle">In-memory datasets</text>
  <text x="192" y="726" class="cardText">Notebook, test, and prototype flows</text>
  <text x="192" y="748" class="cardText">can inject `xarray.Dataset` directly.</text>

  <rect x="104" y="780" width="304" height="28" rx="14" fill="#FFF7EC"/>
  <text x="124" y="799" class="mono">validated xr.Dataset</text>

  <text x="492" y="360" class="laneTitle">XarraySource Core</text>
  <text x="492" y="388" class="laneText">This is the upstream seam: xarray handles multidimensional logic.</text>
  <text x="492" y="406" class="laneText">Lumen still sees a normal source contract.</text>

  <rect x="492" y="426" width="286" height="132" rx="22" fill="#FFFFFF" class="border"/>
  <text x="518" y="458" class="cardMini">ACQUISITION</text>
  <text x="518" y="492" class="cardTitle">Dataset loading</text>
  <text x="518" y="520" class="cardText">Resolve relative paths, distinguish</text>
  <text x="518" y="542" class="cardText">local vs remote URIs, and choose</text>
  <text x="518" y="564" class="cardText">NetCDF vs Zarr safely.</text>

  <rect x="818" y="426" width="286" height="132" rx="22" fill="#FFFFFF" class="border"/>
  <text x="844" y="458" class="cardMini">TABLE MAPPING</text>
  <text x="844" y="492" class="cardTitle">Variable to table resolution</text>
  <text x="844" y="520" class="cardText">Each `data_var` becomes a logical table</text>
  <text x="844" y="542" class="cardText">so pipelines and views still operate</text>
  <text x="844" y="564" class="cardText">through familiar Lumen semantics.</text>

  <rect x="492" y="584" width="286" height="162" rx="22" fill="#FFFFFF" class="border"/>
  <text x="518" y="616" class="cardMini">QUERY ENGINE</text>
  <text x="518" y="650" class="cardTitle">Coordinate-aware selection</text>
  <text x="518" y="678" class="cardText">Scalars, ranges, datetimes, and</text>
  <text x="518" y="700" class="cardText">descending-coordinate handling stay</text>
  <text x="518" y="722" class="cardText">inside xarray via `.sel(...)`.</text>

  <rect x="818" y="584" width="286" height="162" rx="22" fill="#FFFFFF" class="border"/>
  <text x="844" y="616" class="cardMini">INTROSPECTION</text>
  <text x="844" y="650" class="cardTitle">Schema and metadata</text>
  <text x="844" y="678" class="cardText">Expose dims, units, bounds, types,</text>
  <text x="844" y="700" class="cardText">queryable coordinates, and detected</text>
  <text x="844" y="722" class="cardText">roles like time / lat / lon / vertical.</text>

  <rect x="560" y="770" width="478" height="56" rx="18" fill="#FFFFFF" stroke="#1976D2" stroke-width="3"/>
  <text x="584" y="805" class="cardTitle">Late DataFrame flattening + `max_rows` guard</text>

  <rect x="478" y="408" width="640" height="350" rx="28" class="dash"/>
  <text x="1200" y="360" class="laneTitle">Lumen Boundary</text>
  <text x="1200" y="390" class="laneText">Everything downstream continues to interact with</text>
  <text x="1200" y="412" class="laneText">a normal source and normal tables.</text>

  <rect x="1200" y="434" width="298" height="92" rx="22" fill="#FFFFFF" class="border"/>
  <text x="1226" y="466" class="cardMini">SOURCE CONTRACT</text>
  <text x="1226" y="498" class="mono">`get_tables`, `get_schema`</text>
  <text x="1226" y="520" class="mono">`get_metadata`, `get`</text>

  <rect x="1200" y="550" width="298" height="104" rx="22" fill="#FFFFFF" class="border"/>
  <text x="1226" y="582" class="cardMini">PIPELINE LAYER</text>
  <text x="1226" y="616" class="cardTitle">Schema-driven filters</text>
  <text x="1226" y="640" class="cardText">UI widgets derive from queryable coordinates</text>

  <rect x="1200" y="678" width="298" height="104" rx="22" fill="#FFFFFF" class="border"/>
  <text x="1226" y="710" class="cardMini">VIEW LAYER</text>
  <text x="1226" y="744" class="cardTitle">Tables, charts, dashboards</text>
  <text x="1226" y="768" class="cardText">Consumes ordinary DataFrames with no xarray-specific logic</text>

  <path d="M408 476H462" class="arrowLine"/>
  <path d="M408 594H462" class="arrowLine"/>
  <path d="M408 712H462" class="arrowLine"/>
  <path d="M778 492H818" class="arrowLine"/>
  <path d="M778 664H818" class="arrowLine"/>
  <path d="M962 746V770" class="arrowLine"/>
  <path d="M1038 798H1170" class="arrowLine"/>
  <path d="M1348 526V550" class="arrowLine"/>
  <path d="M1348 654V678" class="arrowLine"/>

  <g filter="url(#cardShadow)">
    <rect x="86" y="850" width="1420" height="82" rx="24" fill="#F8FBFF" class="border"/>
  </g>
  <text x="112" y="884" class="calloutTitle">Why this increases proposal strength</text>
  <text x="112" y="912" class="calloutBody">The design is incremental, reviewable, and upstream-friendly: xarray complexity stays isolated, proof is demoable now, and the Lumen-facing API remains familiar.</text>

  <rect x="86" y="84" width="102" height="34" rx="17" fill="#E1F0FF"/>
  <text x="111" y="106" class="badge">Lumen</text>
  <rect x="202" y="84" width="110" height="34" rx="17" fill="#DFF7F1"/>
  <text x="228" y="106" class="badge">xarray</text>

  <g filter="url(#cardShadow)">
    <rect x="930" y="84" width="264" height="54" rx="18" fill="#FFFFFF" class="border"/>
  </g>
  <text x="956" y="117" class="mono">filter first -> flatten last</text>
</svg>
